name: KRUSHIMITRA MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'model.py'
      - 'Crop_recommendation.csv'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'   # Weekly retraining check

jobs:
  data-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt great_expectations
      - name: Validate data
        run: python tests/validate_data.py

  train-and-evaluate:
    needs: data-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Pull data from DVC
      - name: Train model
        run: python model.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      - name: Run model tests
        run: pytest tests/test_model.py -v
      - name: Check model performance gate
        run: python tests/check_performance_gate.py

  build-and-push-docker:
    needs: train-and-evaluate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t krushimitra:${{ github.sha }} .
      - name: Push to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push krushimitra:${{ github.sha }}
          docker tag krushimitra:${{ github.sha }} krushimitra:latest
          docker push krushimitra:latest

  deploy:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying krushimitra:${{ github.sha }}"
          # Add your deployment command here (kubectl, docker-compose, etc.)
